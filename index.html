<!DOCTYPE html>
<html lang="pa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aek Onkar · ੴ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#c8922a; --deep:#0a1628; --lgold:#f0c96b;
  --cream:#fef9ef; --card:#0d1a35;
}
body {
  background: radial-gradient(ellipse at top,#1a2e50 0%,#0a1628 60%);
  min-height:100vh; font-family:Georgia,serif; color:var(--cream);
  overflow-x:hidden;
}

/* ── SCREENS ── */
.screen { display:none; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; }

/* ══ HOME ══ */
#home {
  align-items:center; justify-content:center;
  text-align:center; padding:40px 24px 60px;
}
.home-symbol {
  font-size:5.5rem; color:var(--gold);
  text-shadow:0 0 60px rgba(200,146,42,.7),0 0 120px rgba(200,146,42,.3);
  animation:pulse 3s ease-in-out infinite; margin-bottom:8px;
}
@keyframes pulse {
  0%,100%{text-shadow:0 0 40px rgba(200,146,42,.6),0 0 80px rgba(200,146,42,.2);}
  50%{text-shadow:0 0 90px rgba(200,146,42,1),0 0 180px rgba(200,146,42,.5);}
}
.home-title { font-size:1.7rem; color:var(--lgold); letter-spacing:4px; margin-bottom:6px; }
.home-sub   { font-size:0.82rem; color:rgba(200,146,42,.5); letter-spacing:1px; margin-bottom:44px; }
.divider    { width:60px; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:0 auto 44px; }
.home-btn {
  display:block; width:100%; max-width:300px; margin:0 auto 18px;
  padding:18px 28px; border-radius:12px; border:none; cursor:pointer;
  font-family:Georgia,serif; font-size:1.05rem; letter-spacing:1px;
  transition:transform .2s,box-shadow .2s;
}
.home-btn:active { transform:scale(.97); }
.btn-story { background:linear-gradient(135deg,#c8922a,#a87220); color:#fff8e8; box-shadow:0 6px 24px rgba(200,146,42,.45); }
.home-tag { margin-top:48px; font-size:0.75rem; color:rgba(200,146,42,.35); font-style:italic; line-height:1.9; }

/* ══ TOP BAR ══ */
.top-bar {
  width:100%; padding:12px 16px;
  background:linear-gradient(to right,#0a1628,#1a3060,#0a1628);
  border-bottom:1.5px solid var(--gold);
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 20px rgba(200,146,42,.25);
  position:sticky; top:0; z-index:100;
}
.top-symbol { font-size:1.3rem; color:var(--gold); }
.tb-label   { font-size:0.78rem; color:rgba(200,146,42,.55); letter-spacing:1px; }
.back-btn {
  background:transparent; border:1px solid rgba(200,146,42,.5);
  color:var(--gold); font-family:Georgia,serif; font-size:0.82rem;
  padding:7px 14px; border-radius:6px; cursor:pointer;
}
.back-btn:active { background:rgba(200,146,42,.15); }

/* ══ STORY GRID ══ */
#story { padding-bottom:60px; }
.story-header {
  text-align:center; padding:26px 20px 6px;
  font-size:0.82rem; color:rgba(200,146,42,.55); letter-spacing:1px;
}
.grid { padding:14px; display:flex; flex-direction:column; gap:10px; max-width:680px; width:100%; align-self:center; }
.q-card {
  background:linear-gradient(160deg,#152040 0%,#0d1a35 100%);
  border:1px solid rgba(200,146,42,.3); border-radius:10px;
  padding:16px 18px; display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:border-color .25s,transform .15s;
  text-align:left;
}
.q-card:active { transform:scale(.98); border-color:var(--gold); }
.q-num {
  min-width:34px; height:34px; border-radius:50%;
  background:rgba(200,146,42,.12); border:1px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:0.82rem; color:var(--lgold); flex-shrink:0;
}
.q-text { font-size:0.92rem; color:var(--cream); line-height:1.5; flex:1; }
.q-arrow { color:var(--gold); font-size:0.9rem; }

/* ══ QUESTION SCREEN ══ */
#qscreen {
  align-items:center; justify-content:center;
  text-align:center; padding:40px 28px;
  position:relative;
}
.qs-folded {
  font-size:5rem; margin-bottom:20px;
  animation:sway 2s ease-in-out infinite;
}
@keyframes sway {
  0%,100%{transform:scale(1);} 50%{transform:scale(1.08);}
}
.qs-onkar {
  font-size:1.1rem; color:var(--gold); letter-spacing:1px;
  margin-bottom:28px; opacity:.85;
}
.qs-question {
  font-size:1.25rem; color:var(--lgold); line-height:1.7;
  margin-bottom:36px; max-width:500px;
}
.qs-coming {
  font-size:0.9rem; color:rgba(200,146,42,.6); letter-spacing:2px;
  font-style:italic;
  animation:blink 1.8s ease-in-out infinite;
}
@keyframes blink {
  0%,100%{opacity:.4;} 50%{opacity:1;}
}

/* ══ ANSWER SCREEN ══ */
#ascreen {
  align-items:center; justify-content:flex-start;
  padding:0 0 80px;
}
.as-inner {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; flex:1; padding:48px 28px 40px;
  text-align:center; max-width:600px; align-self:center;
}
.as-mool {
  font-size:1.05rem; color:var(--gold); letter-spacing:1px;
  margin-bottom:10px; opacity:.9;
}
.as-folded {
  font-size:2.8rem; margin-bottom:32px;
}
.as-qtext {
  font-size:0.88rem; color:rgba(200,146,42,.6);
  line-height:1.6; margin-bottom:32px; font-style:italic;
}
.as-answer {
  font-size:1.1rem; color:var(--cream);
  line-height:1.9; margin-bottom:48px;
}
.as-back {
  display:flex; align-items:center; gap:8px;
  background:transparent; border:1.5px solid rgba(200,146,42,.5);
  color:var(--lgold); font-family:Georgia,serif; font-size:0.95rem;
  padding:14px 28px; border-radius:10px; cursor:pointer;
  transition:background .2s;
}
.as-back:active { background:rgba(200,146,42,.12); }

.gb { font-family:'Noto Sans Gurmukhi', Georgia, serif; }

@media(max-width:400px){
  .home-symbol{font-size:4rem;} .home-title{font-size:1.3rem;}
  .qs-question{font-size:1.08rem;} .as-answer{font-size:1rem;}
}
</style>
</head>
<body>
<audio id="audioPlayer" src="aek-onkar.mp3" preload="auto"></audio>

<!-- ══ HOME ══ -->
<div id="home" class="screen active">
  <div class="home-symbol gb">ੴ</div>
  <div class="home-title">AEK ONKAR</div>
  <div class="home-sub gb">ਅੇਕ ਓਂਕਾਰ</div>
  <div class="divider"></div>
  <button class="home-btn btn-story" onclick="showScreen('story')">📖 &nbsp;Story of Aek Onkar</button>
  <div class="home-tag">
    Aek Onkar Satgur Parsad<br>
    <span style="font-size:.7rem;opacity:.6;">One Divine Reality · One Sacred Peace</span>
  </div>
</div>

<!-- ══ STORY GRID ══ -->
<div id="story" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('home')">← Home</button>
    <span class="top-symbol gb">ੴ</span>
    <span class="tb-label">Story of Aek Onkar</span>
  </div>
  <div class="story-header">Tap a question to begin</div>
  <div class="grid" id="grid"></div>
</div>

<!-- ══ QUESTION + AUDIO WAITING ══ -->
<div id="qscreen" class="screen">
  <div class="qs-folded">🙏</div>
  <div class="qs-onkar gb">ੴ ਸਤਿਗੁਰ ਪ੍ਰਸਾਦਿ</div>
  <div class="qs-question" id="qs-q"></div>
  <div class="qs-coming">Answer is coming…</div>
</div>

<!-- ══ ANSWER ══ -->
<div id="ascreen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('story')">← Back</button>
    <span class="top-symbol gb">ੴ</span>
    <span class="tb-label">Answer</span>
  </div>
  <div class="as-inner">
    <div class="as-mool gb">ੴ ਸਤਿਗੁਰ ਪ੍ਰਸਾਦਿ</div>
    <div class="as-folded">🙏</div>
    <div class="as-qtext" id="as-q"></div>
    <div class="as-answer" id="as-a"></div>
    <button class="as-back" onclick="showScreen('story')">← Back to Questions</button>
  </div>
</div>

<script>
// ── SERVICE WORKER ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── SCREEN ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── AUDIO ──
const audio = document.getElementById('audioPlayer');

// ── STORY DATA ──
const items = [
  { q:"Why having an enemy is a deviation",
    a:"For having enmity two are required. It is self injury and deviation from the divine Oneness." },
  { q:"Why speaking a lie is a deviation",
    a:"For telling lies two are required, which takes us towards duality. Telling a lie is lying to our own self." },
  { q:"Why the in-taking and out-giving of fear is a deviation",
    a:"For that, two are required, whereas duality is deviation from divine Oneness." },
  { q:"Why attachment to the world is a deviation",
    a:"World is a simulation — a perception far away from the divine reality of Oneness. It changes like the shadow of a tree. Attachment to shadows is futile and hence a deviation." },
  { q:"Why ego is a chronic disease",
    a:"Our ego is a self-built assumption entirely founded on duality, and hence is a deviation from Oneness." },
  { q:"Why anger is self-harming",
    a:"When all is divine One, anger only backfires. It is like an auto-immune disease — the body harming itself." },
  { q:"Why greed is a deviation",
    a:"Accumulation is done under the spell of duality. In the state of Oneness, who would accumulate from whom? Hence it is a deviation." },
  { q:"Why slandering is counter-productive",
    a:"For slandering there is a minimum requirement of two, which is duality. The light of the Divine One sustains all. Hence slandering is self-harming." },
  { q:"Why lust is injurious",
    a:"Lust is pursued under the assumption that it would go unnoticed. This is a deviation from Oneness. When we know our sin, it is known to the cosmos." },
  { q:"Why we should have no grudge against the happenings of the past",
    a:"There is not any other doer. When the doer is the divine One, such grudges rob us of the blessings." },
  { q:"Why undertaking difficult pilgrimages can remain futile",
    a:"The place of pilgrimage can only be different if there is a perception of duality. Hence it is a deviation from Oneness." },
  { q:"Why any special day or time cannot be more auspicious than another",
    a:"Time is a dimension born of our limited perceiving power. The Divine One is above this perception of time, date, and the day of the week." },
  { q:"Why hurting animals is self-defeating",
    a:"Human form, animal form, plant form — every form is sustained by the Divine One. Hurting them is hurting ourselves." },
  { q:"Why Guru's blessings are important",
    a:"Guru is a manifestation of the Divine One — as is everybody else. But Guru's blessings remove the illusion and merge us with the Divine One." }
];

// ── BUILD GRID ──
const grid = document.getElementById('grid');
items.forEach((item,i)=>{
  const div = document.createElement('div');
  div.className = 'q-card';
  div.innerHTML = `
    <div class="q-num">${i+1}</div>
    <div class="q-text">${item.q}</div>
    <div class="q-arrow">›</div>
  `;
  div.onclick = ()=> startQuestion(i);
  grid.appendChild(div);
});

// ── QUESTION FLOW ──
function startQuestion(i){
  document.getElementById('qs-q').textContent = items[i].q;
  showScreen('qscreen');
  audio.currentTime = 0;
  audio.play().catch(()=>{});
  audio.onended = ()=> showAnswer(i);
  audio.onerror = ()=> setTimeout(()=> showAnswer(i), 4000);
}

function showAnswer(i){
  document.getElementById('as-q').textContent = items[i].q;
  document.getElementById('as-a').textContent = items[i].a;
  showScreen('ascreen');
}
</script>
</body>
</html>
