* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #c8922a;
  --deep-blue: #0a1628;
  --light-gold: #f0c96b;
  --cream: #fef9ef;
  --soft-white: #fffdf6;
  --navy-card: #0d1a35;
}

body {

  font-family: Georgia, serif;
  color: var(--cream);
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; }
.screen.active { display: flex; }

/* ── HOME SCREEN ── */
#home {
  justify-content: center;
  padding: 40px 24px 60px;
  text-align: center;
  position: relative;
}

.home-symbol {
  font-family: 'GurbaniAkhar', Georgia, serif;
  font-size: 5rem;
  color: var(--gold);
  text-shadow: 0 0 60px rgba(200,146,42,0.7), 0 0 120px rgba(200,146,42,0.3);
  margin-bottom: 8px;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { text-shadow: 0 0 40px rgba(200,146,42,0.6), 0 0 80px rgba(200,146,42,0.2); }
  50%       { text-shadow: 0 0 80px rgba(200,146,42,0.9), 0 0 160px rgba(200,146,42,0.4); }
}

.home-title {
  font-size: 1.6rem;
  color: var(--light-gold);
  letter-spacing: 3px;
  margin-bottom: 6px;
}

.home-sub {
  font-size: 0.82rem;
  color: rgba(200,146,42,0.55);
  letter-spacing: 1px;
  margin-bottom: 48px;
}

.home-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 0 auto 48px;
}

.home-btn {
  display: block;
  width: 100%;
  max-width: 300px;
  margin: 0 auto 18px;
  padding: 18px 28px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-family: Georgia, serif;
  font-size: 1.05rem;
  letter-spacing: 1px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.home-btn:active { transform: scale(0.97); }

.btn-story {
  background: linear-gradient(135deg, #c8922a, #a87220);
  color: #fff8e8;
  box-shadow: 0 6px 24px rgba(200,146,42,0.45);
}

.btn-sukhmani {
  background: transparent;
  border: 1.5px solid var(--gold) !important;
  color: var(--light-gold);
}

.btn-sukhmani:active { background: rgba(200,146,42,0.12); }

.home-tagline {
  margin-top: 48px;
  font-size: 0.75rem;
  color: rgba(200,146,42,0.35);
  font-style: italic;
  letter-spacing: 0.5px;
  line-height: 1.8;
}

/* ── TOP BAR ── */
.top-bar {
  width: 100%;
  background: linear-gradient(to right, #0a1628, #1a3060, #0a1628);
  border-bottom: 1.5px solid var(--gold);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 20px rgba(200,146,42,0.25);
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar-title {
  font-family: 'GurbaniAkhar', Georgia, serif;
  font-size: 1.2rem;
  color: var(--light-gold);
}

.back-btn {
  background: transparent;
  border: 1px solid rgba(200,146,42,0.5);
  color: var(--gold);
  font-family: Georgia, serif;
  font-size: 0.82rem;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
.back-btn:active { background: rgba(200,146,42,0.15); }

/* ── STORY SCREEN ── */
#story { padding-bottom: 60px; }

.story-header {
  text-align: center;
  padding: 28px 20px 16px;
  font-family: 'GurbaniAkhar', Georgia, serif;
  font-size: 1.8rem;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(200,146,42,0.5);
}

.story-intro {
  text-align: center;
  font-size: 0.8rem;
  color: rgba(200,146,42,0.5);
  padding: 0 24px 24px;
  letter-spacing: 0.5px;
}

.accordion {
  width: 100%;
  max-width: 680px;
  padding: 0 14px;
}

.acc-item {
  background: linear-gradient(160deg, #152040 0%, #0d1a35 100%);
  border: 1px solid rgba(200,146,42,0.3);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.3s;
}

.acc-item.open { border-color: rgba(200,146,42,0.7); }

.acc-header {
  width: 100%;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
}

.acc-num {
  min-width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(200,146,42,0.12);
  border: 1px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  color: var(--light-gold);
  font-family: Georgia, serif;
}

.acc-question {
  font-family: Georgia, serif;
  font-size: 0.92rem;
  color: var(--cream);
  line-height: 1.5;
  flex: 1;
}

.acc-arrow {
  color: var(--gold);
  font-size: 0.8rem;
  transition: transform 0.3s;
}

.acc-item.open .acc-arrow { transform: rotate(180deg); }

.acc-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.acc-item.open .acc-body { max-height: 300px; }

.acc-content {
  padding: 0 18px 18px 64px;
  font-family: Georgia, serif;
  font-size: 0.88rem;
  color: rgba(254,249,239,0.82);
  line-height: 1.75;
  border-top: 1px solid rgba(200,146,42,0.15);
  padding-top: 14px;
}

.witness-line {
  text-align: center;
  font-family: 'GurbaniAkhar', Georgia, serif;
  font-size: 1rem;
  color: rgba(200,146,42,0.6);
  padding: 28px 24px 8px;
  letter-spacing: 0.5px;
}

/* ── SUKHMANI SCREEN ── */
#sukhmani { padding-bottom: 60px; }

.sukhmani-top-bar {
  width: 100%;
  background: linear-gradient(to right, #0a1628, #1a3060, #0a1628);

.sukhmani-title-wrap {

.s-nav-group {

.s-nav-btn {

}

.s-nav-next {

  color: #fff8e8;

.s-nav-prev, .s-nav-rand {
  background: transparent;
  border: 1px solid rgba(200,146,42,0.5);
  color: var(--light-gold);
}

.s-nav-prev:active, .s-nav-rand:active { background: rgba(200,146,42,0.15); }

.s-counter {
  font-family: Georgia, serif;
  font-size: 0.72rem;
  color: var(--gold);
  min-width: 44px;
  text-align: center;
}

.s-container {
  max-width: 780px;
  width: 100%;
  padding: 20px 16px 60px;
}

.s-ik-onkar {
  text-align: center;
  font-family: 'GurbaniAkhar', serif;
  font-size: 2rem;
  color: var(--gold);
  padding: 14px 0 10px;
  text-shadow: 0 0 30px rgba(200,146,42,0.6);
}

.s-card {
  background: linear-gradient(160deg, #152040 0%, #0d1a35 100%);
  border: 1px solid rgba(200,146,42,0.35);
  border-radius: 12px;
  padding: 10px 0 24px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(240,201,107,0.12);
  position: relative;
  overflow: hidden;
}

.s-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

.s-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

.ashtpadi-badge {
  background: var(--gold);
  color: #0a1628;
  font-family: Georgia, serif;
  font-size: 0.7rem;
  font-weight: bold;
  padding: 4px 0;
  text-align: center;
  width: 100%;
  letter-spacing: 1px;
}

.section-label {
  text-align: center;
  font-family: 'GurbaniAkhar', serif;
  font-size: 1rem;
  padding: 8px 20px;
  display: block;
  width: 100%;
}

.slok-label {
  color: var(--light-gold);
  border-bottom: 1px solid rgba(200,146,42,0.35);
  margin-bottom: 14px;
  padding-bottom: 10px;
}

.astpadi-label {
  color: var(--gold);
  border-top: 1px dashed rgba(200,146,42,0.3);
  border-bottom: 1px dashed rgba(200,146,42,0.3);
  margin: 18px 0 14px;
  padding: 7px 0;
}

.slok-line {
  font-family: 'GurbaniAkhar', serif;
  font-size: 1.2rem;
  line-height: 2.1;
  text-align: center;

  padding: 1px 16px;
}

.verse-line {
  font-family: 'GurbaniAkhar', serif;
  font-size: 1.15rem;
  line-height: 2.1;

.rahao {
  font-family: 'GurbaniAkhar', serif;

}

.s-btn-area {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;

/* ── AUDIO ── */
#audioPlayer { display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 400px) {
  .home-symbol { font-size: 4rem; }

  .verse-line, .slok-line { font-size: 1rem; }
  .sukhmani-title-wrap { font-size: 0.9rem; }
